<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1E824C">
    <title>Offline - Village Connect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #F5F5F0 0%, #e8e8e0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .offline-container {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
            border-top: 8px solid #F7CA18;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { 
            color: #1E824C; 
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 1rem;
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        button {
            background: #1E824C;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .cached-info {
            margin-top: 25px;
            padding: 18px;
            background: #e8f5e9;
            border-radius: 16px;
            text-align: left;
            border-left: 4px solid #1E824C;
        }
        .cached-info ul { margin-top: 10px; padding-left: 20px; }
        .cached-info li { margin: 5px 0; }
        a { color: #1E824C; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="emoji">📡❌</div>
        <h1>You're Offline</h1>
        <p style="color: #666; margin-bottom: 5px;">Village Connect works offline with previously loaded data.</p>
        <div class="cached-info">
            <strong>📦 Cached resources available:</strong>
            <ul>
                <li>🏥 Health clinics</li>
                <li>💧 Water points</li>
                <li>🛒 Market information</li>
                <li>🌦️ Weather (last updated)</li>
            </ul>
        </div>
        <button onclick="location.reload()">⟳ Try Again</button>
        <p style="margin-top: 20px; font-size: 0.9rem;">
            <a href="/">← Return to app (if online)</a>
        </p>
    </div>
</body>
</html>
