<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#1E824C" stroke-width="3"/>
  
  <!-- Malawi Flag Stripes -->
  <rect x="30" y="55" width="140" height="30" fill="#000000" rx="2"/>
  <rect x="30" y="85" width="140" height="30" fill="#CE1126" rx="2"/>
  <rect x="30" y="115" width="140" height="30" fill="#1E824C" rx="2"/>
  
  <!-- Rising Sun -->
  <circle cx="100" cy="100" r="14" fill="#CE1126"/>
  <circle cx="100" cy="100" r="7" fill="#E31D29"/>
  
  <!-- Sun Rays -->
  <line x1="100" y1="74" x2="100" y2="80" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="100" y1="120" x2="100" y2="126" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="74" y1="100" x2="80" y2="100" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="120" y1="100" x2="126" y2="100" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="82" y1="82" x2="86" y2="86" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="114" y1="114" x2="118" y2="118" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="118" y1="82" x2="114" y2="86" stroke="#CE1126" stroke-width="2.5"/>
  <line x1="86" y1="114" x2="82" y2="118" stroke="#CE1126" stroke-width="2.5"/>
  
  <!-- Text -->
  <text x="100" y="168" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="13" font-weight="bold" fill="#1E824C">VILLAGE</text>
  <text x="100" y="183" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="11" font-weight="bold" fill="#1E824C">CONNECT</text>
</svg>