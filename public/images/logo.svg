<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle - White -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#2C3E2F" stroke-width="3"/>
  
  <!-- Malawi Flag Stripes (Top to Bottom) -->
  <!-- Black Stripe (Top) -->
  <rect x="25" y="50" width="150" height="33" fill="#000000" rx="2"/>
  <!-- Red Stripe (Middle) -->
  <rect x="25" y="83" width="150" height="34" fill="#CE1126" rx="2"/>
  <!-- Green Stripe (Bottom) -->
  <rect x="25" y="117" width="150" height="33" fill="#1E824C" rx="2"/>
  
  <!-- Rising Sun (Red, centered on the flag) -->
  <g transform="translate(100, 100)">
    <!-- Sun rays -->
    <line x1="0" y1="-45" x2="0" y2="-35" stroke="#CE1126" stroke-width="3"/>
    <line x1="32" y1="-32" x2="25" y2="-25" stroke="#CE1126" stroke-width="3"/>
    <line x1="45" y1="0" x2="35" y2="0" stroke="#CE1126" stroke-width="3"/>
    <line x1="32" y1="32" x2="25" y2="25" stroke="#CE1126" stroke-width="3"/>
    <line x1="0" y1="45" x2="0" y2="35" stroke="#CE1126" stroke-width="3"/>
    <line x1="-32" y1="32" x2="-25" y2="25" stroke="#CE1126" stroke-width="3"/>
    <line x1="-45" y1="0" x2="-35" y2="0" stroke="#CE1126" stroke-width="3"/>
    <line x1="-32" y1="-32" x2="-25" y2="-25" stroke="#CE1126" stroke-width="3"/>
    
    <!-- Sun circle -->
    <circle cx="0" cy="0" r="22" fill="#CE1126"/>
    
    <!-- Sun inner detail -->
    <circle cx="0" cy="0" r="12" fill="#E31D29"/>
  </g>
  
  <!-- Village Connect Text Below Flag -->
  <text x="100" y="170" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="14" font-weight="bold" fill="#1E824C">VILLAGE</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="12" font-weight="bold" fill="#1E824C">CONNECT</text>
</svg>